apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsa-tracker-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dsa-tracker
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dsa-tracker
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 20
      imagePullSecrets:
        - name: dsa-tracker-regcred
      containers:
        - name: frontend
          image: ani2fun/dsa-tracker-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
