apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsa-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dsa-tracker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dsa-tracker
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: dsa-tracker
          image: ani2fun/dsa-tracker:3a0f3d50084d9ff9d047e9fec9eae7d3819a5763
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: POSTGRES_HOST
              value: postgresql.databases-prod.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: dsa_tracker
            - name: POSTGRES_USER
              value: appuser
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dsa-tracker-db
                  key: postgres-password
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
