# Workload catalog. The image_digest values are captured at snapshot time
# (see deploy/dr/SNAPSHOT.md) and are the source of truth on rebuild.
# Tags drift; digests don't.
#
# Refresh by running: scripts/dr/snapshot-live-state.sh
workloads:
  - name: codefolio
    namespace: apps-prod
    kind: Deployment
    managed_by: argocd
    source_path: deploy/apps/codefolio/overlays/prod
    image: ghcr.io/ani2fun/codefolio:latest
    # image_digest captured at next snapshot run (scripts/dr/snapshot-live-state.sh)
    replicas: 2
    service:
      name: codefolio
      port: 80
      target_port: 8080
    ingress:
      host: kakde.eu
      tls_secret: kakde-eu-tls
      cluster_issuer: letsencrypt-prod-dns01
    secrets:
      - codefolio-db   # SealedSecret committed at deploy/apps/codefolio/overlays/prod/sealedsecret.yaml
    backing_stores:
      - postgres: postgresql.databases-prod.svc.cluster.local:5432/codefolio (shared)
      - redis: codefolio-redis.apps-prod (in-namespace, ephemeral cache)
      - mongo: codefolio-mongo.apps-prod (in-namespace, ephemeral event log)

  - name: codefolio-redis
    namespace: apps-prod
    kind: Deployment
    managed_by: argocd
    source_path: deploy/apps/codefolio/overlays/prod
    image: redis:7-alpine
    replicas: 1
    persistence: ephemeral   # cache only; no PVC
    service:
      name: codefolio-redis
      port: 6379
      target_port: 6379

  - name: codefolio-mongo
    namespace: apps-prod
    kind: Deployment
    managed_by: argocd
    source_path: deploy/apps/codefolio/overlays/prod
    image: mongo:7
    replicas: 1
    persistence: ephemeral   # emptyDir on /data/db; event log resets on pod restart
    service:
      name: codefolio-mongo
      port: 27017
      target_port: 27017

  - name: codefolio-dev
    namespace: apps-dev
    kind: Deployment
    managed_by: kustomize
    source_path: deploy/apps/codefolio/overlays/dev
    image_source: overlay-resolved
    service:
      name: codefolio
      port: 80
      target_port: 8080
    ingress:
      host: dev.codefolio.kakde.eu
      tls_secret: dev-codefolio-kakde-eu-tls
      cluster_issuer: letsencrypt-staging-dns01

  - name: piston
    namespace: apps-prod
    kind: Deployment
    managed_by: argocd
    source_path: deploy/apps/piston/overlays/prod
    # Piston manifest pins by digest; the :latest tag in the manifest is
    # overridden by an `image:` field that includes @sha256.
    image: ghcr.io/engineer-man/piston@sha256:2f66b7456189c4d713aa986d98eccd0b6ee16d26c7ec5f21b30e942756fd127a
    image_digest: sha256:2f66b7456189c4d713aa986d98eccd0b6ee16d26c7ec5f21b30e942756fd127a
    replicas: 1
    service:
      name: piston
      port: 2000
      target_port: 2000
    # Piston has NO public Ingress. It is reached only in-cluster via
    # `piston.apps-prod.svc.cluster.local:2000` — codefolio's server
    # proxies all `/api/run` calls server-side. The notebook-piston-api
    # Ingress and notebook-piston-ratelimit Middleware were retired with
    # note-book.
    api_route:
      via_service: piston.apps-prod.svc.cluster.local:2000
      consumers:
        - codefolio (server-side proxy in /api/run pipeline)

  - name: dsa-tracker-backend
    namespace: apps-prod
    kind: Deployment
    managed_by: argocd
    source_path: deploy/apps/dsa-tracker/overlays/prod
    image: ghcr.io/ani2fun/dsa-tracker-backend:a62470690a49f10432b0e15814d11823ac1cfdbe
    image_digest: sha256:23092d4edc044ab3d0fe51fbd420292aae6fe8dbe80b0879e6d506f9e820a07b
    replicas: 2
    service:
      name: dsa-tracker-backend
      port: 8080
      target_port: 8080
    secrets:
      - dsa-tracker-db   # SealedSecret committed at deploy/apps/dsa-tracker/overlays/prod/sealedsecret.yaml

  - name: dsa-tracker-frontend
    namespace: apps-prod
    kind: Deployment
    managed_by: argocd
    source_path: deploy/apps/dsa-tracker/overlays/prod
    image: ghcr.io/ani2fun/dsa-tracker-frontend:1fcdfe9051fdfc4224a8b4bb3b553161e1a4f593
    image_digest: sha256:109b5935d94ea2fa5ee26f4f5cb1142fae3aa80aa7e2628d46f0eef8b64d56ec
    replicas: 2
    service:
      name: dsa-tracker-frontend
      port: 80
      target_port: 3000
    ingress:
      host: dsa-tracker.kakde.eu
      tls_secret: dsa-tracker-kakde-eu-tls
      cluster_issuer: letsencrypt-prod-dns01

  - name: postgresql
    namespace: databases-prod
    kind: StatefulSet
    managed_by: kubectl-manifests
    source_path: deploy/platform/postgresql/
    image: postgres:17.9
    image_digest: sha256:2cd82735a36356842d5eb1ef80db3ae8f1154172f0f653db48fde079b2a0b7f7
    replicas: 1
    pvc:
      storage_class: local-path
      size: 80Gi
    access:
      service: postgresql.databases-prod.svc.cluster.local:5432
      namespace_access_label: kakde.eu/postgresql-access=true

  # keycloak runs on the cluster but its manifests are maintained out of
  # tree (operator notes). Not tracked here.

  - name: argocd
    namespace: argocd
    kind: platform
    managed_by: kubectl + manual patches
    image: quay.io/argoproj/argocd:v3.3.3
    image_digest: sha256:8b9a0993937850c1ee6e2ada47a2be8259d512e959ae58afa39936658f7b52e7
    host: argocd.kakde.eu
    pinned_node_label:
      workload: argocd
    internal_tls_disabled: true
