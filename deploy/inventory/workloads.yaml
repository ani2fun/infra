# Workload catalog. The image_digest values are captured at snapshot time
# (see deploy/dr/SNAPSHOT.md) and are the source of truth on rebuild.
# Tags drift; digests don't.
#
# Refresh by running: scripts/dr/snapshot-live-state.sh
workloads:
  - name: codefolio
    namespace: apps-prod
    kind: Deployment
    managed_by: argocd
    source_path: deploy/apps/codefolio/overlays/prod
    image: ghcr.io/ani2fun/codefolio:latest
    # image_digest captured at next snapshot run (scripts/dr/snapshot-live-state.sh)
    replicas: 2
    service:
      name: codefolio
      port: 80
      target_port: 8080
    ingress:
      host: kakde.eu
      tls_secret: kakde-eu-tls
      cluster_issuer: letsencrypt-prod-dns01
    secrets:
      - codefolio-db   # SealedSecret committed at deploy/apps/codefolio/overlays/prod/sealedsecret.yaml
    backing_stores:
      - postgres: postgresql.databases-prod.svc.cluster.local:5432/codefolio (shared)
      - redis: codefolio-redis.apps-prod (in-namespace, ephemeral cache)
      - mongo: codefolio-mongo.apps-prod (in-namespace, ephemeral event log)

  - name: codefolio-redis
    namespace: apps-prod
    kind: Deployment
    managed_by: argocd
    source_path: deploy/apps/codefolio/overlays/prod
    image: redis:7-alpine
    replicas: 1
    persistence: ephemeral   # cache only; no PVC
    service:
      name: codefolio-redis
      port: 6379
      target_port: 6379

  - name: codefolio-mongo
    namespace: apps-prod
    kind: Deployment
    managed_by: argocd
    source_path: deploy/apps/codefolio/overlays/prod
    image: mongo:7
    replicas: 1
    persistence: ephemeral   # emptyDir on /data/db; event log resets on pod restart
    service:
      name: codefolio-mongo
      port: 27017
      target_port: 27017

  - name: codefolio-dev
    namespace: apps-dev
    kind: Deployment
    managed_by: kustomize
    source_path: deploy/apps/codefolio/overlays/dev
    image_source: overlay-resolved
    service:
      name: codefolio
      port: 80
      target_port: 8080
    ingress:
      host: dev.codefolio.kakde.eu
      tls_secret: dev-codefolio-kakde-eu-tls
      cluster_issuer: letsencrypt-staging-dns01

  # NOTE: piston and dsa-tracker (backend + frontend) were retired and removed
  # (2026-06-15); their entries were deleted from this inventory. go-judge
  # replaced piston as the in-cluster code runner. This file still predates the
  # cortex / cortex-tutor / go-judge / likec4 apps — refresh it from live state
  # (deploy/live-capture/collect-live-state.sh) to add them.

  - name: postgresql
    namespace: databases-prod
    kind: StatefulSet
    managed_by: kubectl-manifests
    source_path: deploy/platform/postgresql/
    image: postgres:17.9
    image_digest: sha256:2cd82735a36356842d5eb1ef80db3ae8f1154172f0f653db48fde079b2a0b7f7
    replicas: 1
    pvc:
      storage_class: local-path
      size: 80Gi
    access:
      service: postgresql.databases-prod.svc.cluster.local:5432
      namespace_access_label: kakde.eu/postgresql-access=true

  - name: keycloak
    namespace: identity
    kind: Deployment
    managed_by: kubectl-manifests
    source_path: deploy/apps/keycloak/
    image: quay.io/keycloak/keycloak:26.5.5
    image_digest: sha256:a7b0cb7a43a1235a61872883414d3f1d9a3ceac9df6e5907bd12202778a6265c
    replicas: 1
    service:
      name: keycloak
      port: 80
      target_port: 8080
    ingress:
      host: keycloak.kakde.eu
      tls_secret: keycloak-tls
      cluster_issuer: letsencrypt-prod-dns01
    secrets:
      - keycloak-admin-secret
      - keycloak-db-secret
      - keycloak-github-oauth   # SealedSecret committed at deploy/apps/keycloak/overlays/prod/github-oauth-sealedsecret.yaml
    database:
      type: postgres
      host: postgresql.databases-prod.svc.cluster.local
      port: 5432
      name: keycloak

  - name: whoami
    namespace: apps
    kind: Deployment
    managed_by: kubectl-manifests
    source_path: deploy/apps/whoami/
    image: traefik/whoami:latest
    image_digest: sha256:200689790a0a0ea48ca45992e0450bc26ccab5307375b41c84dfc4f2475937ab
    replicas: 1
    service:
      name: whoami
      port: 80
      target_port: 80
    ingress:
      host: whoami.kakde.eu
      tls_secret: whoami-kakde-eu-tls
      cluster_issuer: letsencrypt-prod-dns01

  # whoami-oauth2-proxy is NOT currently deployed. The manifests are kept
  # in deploy/apps/whoami/ as a deployable template; activate per the
  # README in that directory if/when whoami-auth.kakde.eu is needed.
  # - name: whoami-oauth2-proxy
  #   namespace: apps
  #   kind: Deployment
  #   managed_by: kubectl-manifests
  #   source_path: deploy/apps/whoami/
  #   image: quay.io/oauth2-proxy/oauth2-proxy:v7.14.3
  #   replicas: 1
  #   service:
  #     name: whoami-oauth2-proxy
  #     port: 4180
  #     target_port: 4180
  #   ingress:
  #     host: whoami-auth.kakde.eu
  #   secrets:
  #     - whoami-oauth2-proxy
  #   oidc:
  #     provider: keycloak-oidc
  #     issuer_url: https://keycloak.kakde.eu/realms/kakde
  #     redirect_url: https://whoami-auth.kakde.eu/oauth2/callback

  - name: argocd
    namespace: argocd
    kind: platform
    managed_by: kubectl + manual patches
    image: quay.io/argoproj/argocd:v3.3.3
    image_digest: sha256:8b9a0993937850c1ee6e2ada47a2be8259d512e959ae58afa39936658f7b52e7
    host: argocd.kakde.eu
    pinned_node_label:
      workload: argocd
    internal_tls_disabled: true

  # --- Observability stack (monitoring namespace, Argo-synced, metrics-only) ---
  - name: vmsingle
    namespace: monitoring
    kind: Deployment
    managed_by: argocd
    source_path: deploy/apps/monitoring/overlays/prod
    image: victoriametrics/victoria-metrics:v1.144.0
    replicas: 1
    pinned_node: wk-1   # local-path PVC is node-local; pinned by hostname
    pvc:
      storage_class: local-path
      size: 20Gi
      retention: 30d
    service:
      name: vmsingle
      port: 8428
      target_port: 8428

  - name: vmagent
    namespace: monitoring
    kind: Deployment
    managed_by: argocd
    source_path: deploy/apps/monitoring/overlays/prod
    image: victoriametrics/vmagent:v1.144.0
    replicas: 1
    remote_write: http://vmsingle.monitoring.svc.cluster.local:8428/api/v1/write

  - name: node-exporter
    namespace: monitoring
    kind: DaemonSet
    managed_by: argocd
    source_path: deploy/apps/monitoring/overlays/prod
    image: prom/node-exporter:v1.11.1
    notes: runs on all 4 nodes (tolerates control-plane + edge taints); hostNetwork :9100

  - name: kube-state-metrics
    namespace: monitoring
    kind: Deployment
    managed_by: argocd
    source_path: deploy/apps/monitoring/overlays/prod
    image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.19.1
    replicas: 1
    service:
      name: kube-state-metrics
      port: 8080
      target_port: 8080

  - name: grafana
    namespace: monitoring
    kind: Deployment
    managed_by: argocd
    source_path: deploy/apps/monitoring/overlays/prod
    image: grafana/grafana:13.0.2
    replicas: 1
    persistence: ephemeral   # emptyDir; datasource + dashboards provisioned from Git
    service:
      name: grafana
      port: 80
      target_port: 3000
    ingress:
      host: grafana.kakde.eu
      tls_secret: grafana-kakde-eu-tls
      cluster_issuer: letsencrypt-prod-dns01
    auth: github-oauth (locked to GitHub user ani2fun via role_attribute_path + strict mode)
    secrets:
      - grafana-github-oauth   # SealedSecret at deploy/apps/monitoring/overlays/prod/grafana-github-oauth-sealedsecret.yaml
      - grafana-admin          # SealedSecret (break-glass local login)
