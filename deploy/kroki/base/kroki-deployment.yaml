apiVersion: apps/v1
kind: Deployment
metadata:
  name: kroki
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kroki
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kroki
        app.kubernetes.io/component: server
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: kroki
          image: yuzutech/kroki:0.30.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            # Kubernetes injects KROKI_PORT from the Service named "kroki".
            # Kroki expects an integer value there, so pin it explicitly.
            - name: KROKI_PORT
              value: "8000"
            - name: KROKI_EXCALIDRAW_HOST
              value: kroki-excalidraw
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
