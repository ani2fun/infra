apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.0
          args: ["start"]
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          envFrom:
            - secretRef:
                name: keycloak-admin
            - secretRef:
                name: keycloak-db
          env:
            # ---- Database ----
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL_HOST
              value: "postgres-postgresql.databases.svc.cluster.local"
            - name: KC_DB_URL_PORT
              value: "5432"
            - name: KC_DB_URL_DATABASE
              value: "keycloakdb"
            - name: KC_DB_USERNAME
              value: "keycloak"

            # ---- Ingress / Proxy ----
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HTTP_ENABLED
              value: "true"

            # ---- Hostname for correct redirects ----
            - name: KC_HOSTNAME
              value: "keyclock.kakde.eu"
            - name: KC_HOSTNAME_STRICT
              value: "true"

            # ---- Single replica settings ----
            - name: KC_CACHE
              value: "local"

            # ---- Health endpoints (management port) ----
            - name: KC_HEALTH_ENABLED
              value: "true"

          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
