# Hardware watchdog (added 2026-07-18).
#
# systemd arms /dev/watchdog and pings it every RuntimeWatchdogSec/2. If the kernel wedges hard
# enough to stop scheduling — the failure mode seen on wk-1, where the journal simply stops
# mid-line with no panic recorded — the TCO timer expires and the board resets itself. Without
# it, that hang persists until someone physically power-cycles the machine.
#
# 60s is deliberately generous: the driver defaults to 30s, and a tight budget risks a spurious
# reset when a node is merely busy rather than hung.
#
# NOT EVERY BOARD ALLOWS THIS. If the firmware locks the TCO off you will see
#   iTCO_wdt: unable to reset NO_REBOOT flag, device disabled by hardware/BIOS
# and no /dev/watchdog appears (this is wk-2's situation). Leave the file installed — it takes
# effect the moment the BIOS option is enabled. Do NOT substitute softdog: a software watchdog
# is a kernel timer, so the very hang it would need to catch also stops it firing.
[Manager]
RuntimeWatchdogSec=60
RebootWatchdogSec=10min
