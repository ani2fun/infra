# Edge node only. Captured from the Contabo cloud image dropin chain.
# Net effect of /etc/ssh/sshd_config.d/{50-cloud-init.conf,60-cloudimg-settings.conf}:
#   PasswordAuthentication no  (last write wins)
# Public SSH access is gated by the edge_guardrail nftables allowlist that
# only permits SSH from the operator's home IP.
PasswordAuthentication no
