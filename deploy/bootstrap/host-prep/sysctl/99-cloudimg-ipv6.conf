# Edge node only. Disable IPv6 privacy extensions on the public NIC because
# Contabo provisions a fixed public IPv6 (2a02:c207:2311:7393::1/64) and
# the temporary-address rotation interferes with reachability.
# Captured from the Contabo cloud image; preserved by prepare-host.sh.
net.ipv6.conf.all.use_tempaddr = 0
net.ipv6.conf.default.use_tempaddr = 0
