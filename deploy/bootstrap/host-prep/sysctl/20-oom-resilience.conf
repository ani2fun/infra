# Node OOM resilience — installed on every node by prepare-host.sh.
#
# Added after the 2026-06-13 wk-1 outage: a 26 GB desktop session drove the node
# into node-wide OOM, and with vm.panic_on_oom=0 the kernel thrashed instead of
# rebooting, so the node wedged for ~7h until a manual power-cycle. These settings
# make a node that exhausts memory REBOOT ITSELF (self-heal) instead of hanging.
#
# vm.panic_on_oom=1 panics only on *node-wide* OOM. A pod that hits its own cgroup
# memory limit is still handled by a normal pod OOM-kill — this does NOT reboot the
# node for a single misbehaving pod, only when the whole node is truly out of memory.
vm.panic_on_oom = 1
kernel.panic = 10
kernel.panic_on_oops = 1
# Larger free reserve so the kernel/network stack don't starve before the OOM
# killer (or a kubelet eviction) can act.
vm.min_free_kbytes = 131072
