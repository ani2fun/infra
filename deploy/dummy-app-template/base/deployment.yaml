apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-app-template
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dummy-app-template
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dummy-app-template
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: dummy-app-template
          image: REPLACE_WITH_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: REPLACE_WITH_CONTAINER_PORT
          readinessProbe:
            httpGet:
              path: /
              port: REPLACE_WITH_CONTAINER_PORT
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault