apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cortex
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cortex
        app.kubernetes.io/component: app
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: cortex
          image: ghcr.io/ani2fun/cortex:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DB_URL
              value: jdbc:postgresql://postgresql.databases-prod.svc.cluster.local:5432/cortex
            - name: DB_USER
              value: cortex
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cortex-db
                  key: postgres-password
            - name: REDIS_URL
              value: redis://cortex-redis:6379
            - name: MONGO_URI
              value: mongodb://cortex-mongo:27017
            - name: MONGO_DB
              value: cortex
            # go-judge sandbox — the single code-execution backend for /api/run and the Cortex
            # Visualise tracer (ADR-0029). Shared cluster service (deploy/apps/go-judge).
            - name: EXECUTOR_URL
              value: http://go-judge:5050
            # LikeC4 SPA (system-design diagrams), reverse-proxied at /c4/*. Shared cluster service
            # (deploy/apps/likec4); the networkpolicy-likec4 below grants cortex ingress to it.
            - name: LIKEC4_URL
              value: http://likec4
            - name: CORTEX_AUTO_RELOAD
              value: "false"
            # Auth (ADR-0013): JWTs validated against the homelab Keycloak. The cortex-web public
            # PKCE client must exist in the apps-prod realm with cortex.kakde.eu redirect URIs.
            - name: AUTH_ENABLED
              value: "true"
            - name: KEYCLOAK_ISSUER_URL
              value: https://keycloak.kakde.eu/realms/apps-prod
            - name: KEYCLOAK_REALM
              value: apps-prod
            - name: KEYCLOAK_CLIENT_ID
              value: cortex-web
            # The standalone Socratic tutor (deploy/apps/cortex-tutor). Surfaced to the SPA via
            # /api/auth/config tutorBaseUrl; the frontend calls the tutor directly (SSE + JWT).
            # Inert until a cortex build that reads CORTEX_TUTOR_BASE_URL ships (P5 server work).
            - name: CORTEX_TUTOR_BASE_URL
              value: https://cortex-tutor.kakde.eu
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
