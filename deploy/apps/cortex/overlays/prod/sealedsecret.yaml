---
# PLACEHOLDER — re-seal before deploying. This bogus encryptedData will NOT decrypt; the
# sealed-secrets controller will refuse it and the cortex Deployment's DB_PASSWORD will be unset.
# Generate the real value with the kubeseal command documented in ../../bootstrap.sql, which writes
# over this file. (Per the infra repo convention: placeholders use CHANGE_ME_*.)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cortex-db
  namespace: apps-prod
spec:
  encryptedData:
    postgres-password: CHANGE_ME_SEAL_WITH_KUBESEAL
  template:
    metadata:
      name: cortex-db
      namespace: apps-prod
