apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No `labels: includeSelectors: true` — the NetworkPolicy inlines the synapse
# consumer podSelector, which selector-injection would rewrite (the same rule
# as deploy/apps/go-judge). The PriorityClass `go-judge-low` is referenced,
# not redefined: it is cluster-scoped and owned by deploy/apps/go-judge.

resources:
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
