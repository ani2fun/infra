apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# The base intentionally only ships the live whoami app. The oauth2-proxy
# template files (oauth2-proxy-*.yaml) are present but commented out below;
# activate them in the overlay once the SealedSecret is in place.
resources:
  - whoami-deployment.yaml
  - whoami-service.yaml
