# NOT YET DEPLOYED. Template for the oauth2-proxy + whoami-auth flow.
# When ready: seal the secret with scripts/secrets/seal-whoami-oauth2-proxy.sh,
# add this resource to overlays/prod/kustomization.yaml, then `kubectl apply`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami-oauth2-proxy
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami-oauth2-proxy
  template:
    metadata:
      labels:
        app: whoami-oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.14.3
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://keycloak.kakde.eu/realms/kakde
            - --redirect-url=https://whoami-auth.kakde.eu/oauth2/callback
            - --upstream=http://whoami.apps.svc.cluster.local:80
            - --email-domain=*
            - --http-address=0.0.0.0:4180
            - --cookie-secure=true
            - --pass-access-token=true
            - --pass-authorization-header=true
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: whoami-oauth2-proxy
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: whoami-oauth2-proxy
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: whoami-oauth2-proxy
                  key: cookie-secret
          ports:
            - name: http
              containerPort: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
