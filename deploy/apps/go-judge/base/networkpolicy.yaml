apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: go-judge-isolation
  labels:
    app.kubernetes.io/name: go-judge
    app.kubernetes.io/component: executor
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: go-judge
      app.kubernetes.io/component: executor
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only the codefolio app may reach the executor REST API. (go-judge is not
    # public — no traefik route.) Health probes are exec-based, so they do not
    # need an ingress allowance here.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: codefolio
              app.kubernetes.io/component: app
      ports:
        - protocol: TCP
          port: 5050
  # Deny all egress: go-judge initiates nothing outbound (toolchains are baked
  # into the image; sandboxes run with no network). Reply traffic for the
  # ingress above is permitted by connection tracking. Mirrors the prior
  # code-runner isolation policy.
  egress: []
