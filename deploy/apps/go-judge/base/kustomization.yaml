apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOTE: deliberately NO `labels: includeSelectors: true` here. The NetworkPolicy
# inlines a cross-app `from: codefolio` podSelector, which selector-injection
# would silently rewrite to name=go-judge (see the piston base for that trap).
# Labels are written explicitly in each manifest instead.

resources:
  - priorityclass.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
