# vmagent: scrapes all targets (see vmagent-scrape ConfigMap) and remote-writes
# samples to vmsingle. Stateless — buffers to an emptyDir only between flushes,
# so it can schedule on any home worker (the edge taint keeps it off vm-1).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmagent
  labels:
    app.kubernetes.io/name: vmagent
    app.kubernetes.io/component: scraper
    app.kubernetes.io/part-of: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vmagent
      app.kubernetes.io/component: scraper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vmagent
        app.kubernetes.io/component: scraper
        app.kubernetes.io/part-of: monitoring
    spec:
      serviceAccountName: vmagent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vmagent
          image: victoriametrics/vmagent:v1.144.0
          imagePullPolicy: IfNotPresent
          args:
            - -promscrape.config=/etc/vmagent/scrape.yml
            - -remoteWrite.url=http://vmsingle.monitoring.svc.cluster.local:8428/api/v1/write
            - -remoteWrite.tmpDataPath=/tmpdata
            - -promscrape.config.strictParse=true
            # Hot-reload the scrape config when the mounted ConfigMap changes
            # (no pod restart needed after editing vmagent-scrape).
            - -promscrape.configCheckInterval=1m
          ports:
            - name: http
              containerPort: 8429
          readinessProbe:
            httpGet:
              path: /health
              port: 8429
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
          volumeMounts:
            - name: scrape-config
              mountPath: /etc/vmagent
              readOnly: true
            - name: tmpdata
              mountPath: /tmpdata
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: scrape-config
          configMap:
            name: vmagent-scrape
        - name: tmpdata
          emptyDir: {}
