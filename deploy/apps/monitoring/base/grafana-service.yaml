# Port 80 -> 3000 to match the repo convention (ingress backends reference port
# 80, as with cortex/keycloak). The overlay Ingress points here.
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
