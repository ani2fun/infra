# Vector pipeline: tail every pod's container logs, lift the useful Kubernetes
# metadata to flat top-level fields, and ship to VictoriaLogs via its
# Elasticsearch ingestion endpoint.
#
# Why the remap: Vector's kubernetes_logs source nests metadata under
# `.kubernetes.*`. Pointing _stream_fields at nested names is a known
# foot-gun (streams come up empty), so we copy the three fields we want for the
# log stream to flat `namespace` / `pod` / `container` first.
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/part-of: monitoring
data:
  vector.yaml: |
    data_dir: /vector-data-dir
    api:
      enabled: false

    sources:
      k8s:
        type: kubernetes_logs

    transforms:
      reshape:
        type: remap
        inputs: [k8s]
        source: |
          .namespace = to_string(.kubernetes.pod_namespace) ?? ""
          .pod       = to_string(.kubernetes.pod_name) ?? ""
          .container = to_string(.kubernetes.container_name) ?? ""
          .node      = to_string(.kubernetes.pod_node_name) ?? ""
          # Drop the bulky nested object + Vector internals to keep logs lean.
          del(.kubernetes)
          del(.file)
          del(.source_type)

    sinks:
      vlogs:
        type: elasticsearch
        inputs: [reshape]
        endpoints:
          - http://vlsingle.monitoring.svc.cluster.local:9428/insert/elasticsearch/
        api_version: v8
        compression: gzip
        healthcheck:
          enabled: false
        query:
          _msg_field: message
          _time_field: timestamp
          _stream_fields: namespace,pod,container
        request:
          headers:
            AccountID: "0"
            ProjectID: "0"
