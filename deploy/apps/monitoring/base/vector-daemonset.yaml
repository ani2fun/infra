# Vector log collector: one pod per node (incl. control-plane + edge, via the
# all-taints toleration) tailing /var/log/pods. Runs as root because the host
# log files are root-owned (same rationale as a node-level exporter); no extra
# capabilities, read-only host mounts.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: log-collector
    app.kubernetes.io/part-of: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vector
      app.kubernetes.io/component: log-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vector
        app.kubernetes.io/component: log-collector
        app.kubernetes.io/part-of: monitoring
    spec:
      serviceAccountName: vector
      # Cover every node, including control-plane and the public edge.
      tolerations:
        - operator: Exists
      securityContext:
        runAsUser: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vector
          image: timberio/vector:0.56.0-distroless-libc
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/vector/vector.yaml
          env:
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: VECTOR_SELF_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VECTOR_SELF_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            - name: data
              mountPath: /vector-data-dir
            - name: varlog
              mountPath: /var/log
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: vector-config
        # Read checkpoints persist across restarts so logs aren't re-ingested.
        - name: data
          hostPath:
            path: /var/lib/vector
            type: DirectoryOrCreate
        # /var/log covers /var/log/pods (real files) + /var/log/containers (symlinks).
        - name: varlog
          hostPath:
            path: /var/log
