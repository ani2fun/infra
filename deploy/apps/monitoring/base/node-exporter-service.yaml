# Headless Service so vmagent's `endpoints` SD job discovers one target per node
# (each endpoint = a node-exporter pod on its host IP:9100).
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  labels:
    app.kubernetes.io/name: node-exporter
    app.kubernetes.io/component: exporter
    app.kubernetes.io/part-of: monitoring
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: node-exporter
    app.kubernetes.io/component: exporter
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
      protocol: TCP
