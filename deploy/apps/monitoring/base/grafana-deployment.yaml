# Grafana: the dashboard UI, exposed publicly at grafana.kakde.eu (overlay
# ingress) but gated by GitHub OAuth locked to a single admin (ani2fun).
# Stateless: datasource + dashboards are provisioned from Git (ConfigMaps), so
# /var/lib/grafana is an emptyDir and the whole UI is re-derivable.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: dashboard
        app.kubernetes.io/part-of: monitoring
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana:13.0.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            # --- server ---
            - name: GF_SERVER_ROOT_URL
              value: https://grafana.kakde.eu
            # Install the VictoriaLogs datasource plugin at startup (into the
            # writable /var/lib/grafana/plugins emptyDir). Signed plugin from the
            # Grafana catalog; needs egress on first start.
            - name: GF_INSTALL_PLUGINS
              value: victoriametrics-logs-datasource
            # --- local break-glass admin (sealed); GitHub OAuth is the primary path ---
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            # --- GitHub OAuth, locked to GitHub user ani2fun ---
            - name: GF_AUTH_GITHUB_ENABLED
              value: "true"
            - name: GF_AUTH_GITHUB_ALLOW_SIGN_UP
              value: "true"
            - name: GF_AUTH_GITHUB_SCOPES
              value: user:email
            - name: GF_AUTH_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: grafana-github-oauth
                  key: client-id
            - name: GF_AUTH_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-github-oauth
                  key: client-secret
            # The single-user lock: role_attribute_path returns a role ONLY for
            # login 'ani2fun'; strict mode denies login when the role is empty —
            # so every other GitHub account is rejected. Add users by extending
            # this JMESPath, e.g.
            #   contains(['ani2fun','newperson'], login) && 'Editor' || ''
            - name: GF_AUTH_GITHUB_ROLE_ATTRIBUTE_PATH
              value: "login=='ani2fun' && 'GrafanaAdmin' || ''"
            - name: GF_AUTH_GITHUB_ROLE_ATTRIBUTE_STRICT
              value: "true"
            - name: GF_AUTH_GITHUB_ALLOW_ASSIGN_GRAFANA_ADMIN
              value: "true"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 250m
              # Grafana 13 (built-in apiserver + bleve search index + live
              # websocket) needs more than the 256Mi that sufficed for v11 —
              # it was OOMKilled (exit 137) at 256Mi the moment an admin browsed.
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          emptyDir: {}
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
