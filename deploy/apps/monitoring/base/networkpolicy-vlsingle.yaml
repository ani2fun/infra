apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  # vlsingle (VictoriaLogs) likewise has no auth, and logs routinely carry tokens /
  # PII. Restrict :9428 to Vector (log ingest), vmagent (scrapes vlsingle's own
  # /metrics) and Grafana (LogsQL queries); every other pod is denied. Host-sourced
  # kubelet probes are unaffected (see vmsingle policy note).
  name: vlsingle-allow-ingress
  labels:
    app.kubernetes.io/name: vlsingle
    app.kubernetes.io/component: logs-store
    app.kubernetes.io/part-of: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vlsingle
      app.kubernetes.io/component: logs-store
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vector
              app.kubernetes.io/component: log-collector
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vmagent
              app.kubernetes.io/component: scraper
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
              app.kubernetes.io/component: dashboard
      ports:
        - protocol: TCP
          port: 9428
