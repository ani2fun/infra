# A minimal in-repo starter dashboard so the scrape -> store -> datasource ->
# dashboard pipeline works end to end on first sync. Richer community dashboards
# (1860 / 15757 / 10229) are imported via the UI — see README. Add more *.json
# keys here to GitOps-manage additional dashboards later.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring
data:
  homelab-overview.json: |
    {
      "uid": "homelab-overview",
      "title": "Homelab Overview",
      "tags": ["homelab"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": { "list": [] },
      "annotations": { "list": [] },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Scrape targets up",
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" } }, "overrides": [] },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "victoriametrics" }, "expr": "count(up == 1)" }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Pods running",
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" } }, "overrides": [] },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "victoriametrics" }, "expr": "sum(kube_pod_status_phase{phase=\"Running\"})" }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Node memory available (bytes)",
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "fieldConfig": { "defaults": { "unit": "bytes", "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "victoriametrics" }, "expr": "node_memory_MemAvailable_bytes", "legendFormat": "{{instance}}" }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Node CPU busy %",
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "victoriametrics" }, "expr": "100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))", "legendFormat": "{{instance}}" }
          ]
        }
      ]
    }
