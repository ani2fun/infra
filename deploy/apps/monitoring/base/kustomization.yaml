apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespace first so Argo/kubectl create it before the namespaced objects.
  - namespace.yaml
  # VictoriaMetrics (metrics store) + its scraper.
  - vmsingle-pvc.yaml
  - vmsingle-deployment.yaml
  - vmsingle-service.yaml
  - vmagent-rbac.yaml
  - vmagent-scrape-configmap.yaml
  - vmagent-deployment.yaml
  # Exporters.
  - node-exporter-daemonset.yaml
  - node-exporter-service.yaml
  - kube-state-metrics-rbac.yaml
  - kube-state-metrics-deployment.yaml
  - kube-state-metrics-service.yaml
  # Logs: VictoriaLogs store + Vector collector (DaemonSet).
  - vlsingle-pvc.yaml
  - vlsingle-deployment.yaml
  - vlsingle-service.yaml
  - vector-rbac.yaml
  - vector-configmap.yaml
  - vector-daemonset.yaml
  # Grafana + provisioning.
  - grafana-datasource-configmap.yaml
  - grafana-dashboards-provider-configmap.yaml
  - grafana-dashboards-configmap.yaml
  - grafana-deployment.yaml
  - grafana-service.yaml
