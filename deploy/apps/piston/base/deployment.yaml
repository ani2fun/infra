apiVersion: apps/v1
kind: Deployment
metadata:
  name: piston
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: piston
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: piston
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: piston
          image: ghcr.io/engineer-man/piston@sha256:2f66b7456189c4d713aa986d98eccd0b6ee16d26c7ec5f21b30e942756fd127a
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - >-
              CGROUP_FS=/sys/fs/cgroup &&
              [ -e "$CGROUP_FS" ] &&
              [ ! -e "$CGROUP_FS/unified" ] &&
              [ -e "$CGROUP_FS/cgroup.subtree_control" ] &&
              cd "$CGROUP_FS" &&
              mkdir -p isolate &&
              { echo 1 > isolate/cgroup.procs || true; } &&
              { echo '+cpuset +cpu +io +memory +pids' > cgroup.subtree_control || true; } &&
              cd isolate &&
              mkdir -p init &&
              { echo 1 > init/cgroup.procs || true; } &&
              { echo '+cpuset +memory' > cgroup.subtree_control || true; } &&
              echo "Initialized cgroup" &&
              chown -R piston:piston /piston &&
              su -- piston -c 'ulimit -n 65536 && node /piston_api/src' &
              api_pid=$! &&
              node -e "
              const http = require('http');
              const request = (method, path, body) => new Promise((resolve, reject) => {
                const req = http.request(
                  {
                    hostname: '127.0.0.1',
                    port: 2000,
                    path,
                    method,
                    headers: body ? { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) } : {}
                  },
                  (res) => {
                    let data = '';
                    res.on('data', (chunk) => data += chunk);
                    res.on('end', () => resolve({ status: res.statusCode, data }));
                  }
                );
                req.on('error', reject);
                if (body) req.write(body);
                req.end();
              });
              const required = [
                { language: 'rust',       version: '*' },
                { language: 'python',     version: '*' },
                { language: 'node',       version: '*' },
                { language: 'typescript', version: '*' },
                { language: 'sqlite3',    version: '*' }
              ];
              (async () => {
                for (let i = 0; i < 60; i += 1) {
                  try {
                    const r = await request('GET', '/api/v2/packages');
                    if (r.status === 200) break;
                  } catch (_) {}
                  await new Promise((resolve) => setTimeout(resolve, 1000));
                  if (i === 59) throw new Error('Timed out waiting for the Piston API to become ready');
                }
                const listRes = await request('GET', '/api/v2/packages');
                const list = JSON.parse(listRes.data);
                for (const pkg of required) {
                  const already = list.some((p) => p.language === pkg.language && p.installed);
                  if (already) {
                    console.log('[piston-init] ' + pkg.language + ': already installed');
                    continue;
                  }
                  console.log('[piston-init] ' + pkg.language + ': installing...');
                  try {
                    const install = await request('POST', '/api/v2/packages', JSON.stringify(pkg));
                    if (install.status >= 200 && install.status < 300) {
                      console.log('[piston-init] ' + pkg.language + ': ok');
                    } else {
                      console.error('[piston-init] ' + pkg.language + ': install failed (' + install.status + '): ' + install.data);
                    }
                  } catch (e) {
                    console.error('[piston-init] ' + pkg.language + ': install threw: ' + (e.message || e));
                  }
                }
              })().catch((error) => {
                console.error('[piston-init] fatal: ' + (error.message || error));
              });
              " &&
              wait "$api_pid"
          ports:
            - name: http
              containerPort: 2000
          env:
            # Codefolio's server proxies all Piston calls in-cluster — no
            # browser-origin currently calls Piston directly. The CORS
            # origin is kept as the apex so a future codefolio frontend
            # could fetch /api/v2/execute without a 403.
            - name: PISTON_CORS_ORIGIN
              value: "https://kakde.eu"
            - name: PISTON_DISABLE_NETWORKING
              value: "true"
            - name: PISTON_MAX_CONCURRENT_JOBS
              value: "4"
            - name: PISTON_COMPILE_TIMEOUT
              value: "10000"
            # Match codefolio's PistonWire request (run_timeout=10000).
            # 3s was the public-piston default; in a homelab where we own
            # the runner we can let interactive Cortex examples take longer.
            - name: PISTON_RUN_TIMEOUT
              value: "10000"
            - name: PISTON_COMPILE_MEMORY_LIMIT
              value: "536870912"
            - name: PISTON_RUN_MEMORY_LIMIT
              value: "268435456"
            - name: PISTON_OUTPUT_MAX_SIZE
              value: "16384"
            - name: PISTON_MAX_FILE_SIZE
              value: "100000000"
            - name: PISTON_MAX_PROCESS_COUNT
              value: "64"
            - name: PISTON_MAX_OPEN_FILES
              value: "64"
          volumeMounts:
            - name: packages
              mountPath: /piston/packages
          readinessProbe:
            httpGet:
              path: /api/v2/runtimes
              port: 2000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /api/v2/runtimes
              port: 2000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          # Piston uses `unshare` to sandbox code execution — requires privileged mode
          securityContext:
            privileged: true
      volumes:
        - name: packages
          persistentVolumeClaim:
            claimName: piston-packages
