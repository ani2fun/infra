apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: piston-allow-ingress-from-traefik
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: piston
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    # Public route: traefik → piston (kept for any future direct browser
    # access; the codefolio frontend doesn't use it today).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
        - ipBlock:
            cidr: 10.42.102.128/32
      ports:
        - protocol: TCP
          port: 2000
    # NOTE: the in-cluster ingress rule from codefolio lives in
    # `deploy/apps/codefolio/base/networkpolicy-piston.yaml`, NOT here.
    # This kustomization applies `app.kubernetes.io/name: piston` to all
    # selectors (`includeSelectors: true`), which would silently rewrite
    # any cross-app podSelector we tried to inline below.
