---
# PLACEHOLDER — replace by running scripts/secrets/seal-synapse-secrets.sh (needs
# cluster access for the Sealed Secrets cert). Until the real seal lands, the
# controller cannot unseal this and the synapse pod waits in
# CreateContainerConfigError — the same first-deploy convention as cortex.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: synapse-db
  namespace: apps-prod
spec:
  encryptedData:
    postgres-password: CHANGE_ME_RUN_seal-synapse-secrets.sh
  template:
    metadata:
      name: synapse-db
      namespace: apps-prod
