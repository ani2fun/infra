apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps-prod
resources:
  - ../../base
  - ingress.yaml
  - sealedsecret-db.yaml
  - sealedsecret-keycloak-admin.yaml
# No replicas patch: 1 replica is deliberate (per-pod rate limiter + go-judge
# semaphore, ADR-S033) — unlike cortex's replicas-2 overlay.
images:
  - name: ghcr.io/ani2fun/synapse
    newName: ghcr.io/ani2fun/synapse
    newTag: latest # CI (build-push-promote) patches this to the commit SHA on every synapse main push
