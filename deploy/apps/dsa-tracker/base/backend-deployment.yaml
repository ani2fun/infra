apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsa-tracker-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dsa-tracker
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dsa-tracker
        app.kubernetes.io/component: backend
    spec:
      terminationGracePeriodSeconds: 20
      nodeSelector:
        kubernetes.io/hostname: wk-2
      containers:
        - name: backend
          image: ani2fun/dsa-tracker-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: POSTGRES_HOST
              value: postgresql.databases-prod.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: dsa_tracker
            - name: POSTGRES_USER
              value: appuser
            - name: KEYCLOAK_URL
              value: https://keycloak.kakde.eu
            - name: KEYCLOAK_PUBLIC_URL
              value: https://keycloak.kakde.eu
            - name: KEYCLOAK_ISSUER_URI
              value: https://keycloak.kakde.eu/realms/apps-prod
            - name: KEYCLOAK_REALM
              value: apps-prod
            - name: KEYCLOAK_CLIENT_ID
              value: dsa-tracker-web
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dsa-tracker-db
                  key: postgres-password
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
