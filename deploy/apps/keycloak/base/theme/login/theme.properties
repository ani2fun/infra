# Synapse login theme — extends the stock keycloak.v2 (PatternFly v5) theme.
#
# No forked templates: everything is CSS-only (css/synapse.css), so Keycloak
# upgrades keep working as long as keycloak.v2 exists. The GitHub button is
# moved ABOVE the username/password form purely with flex `order` rules.
#
# Mounted from the `keycloak-synapse-theme` ConfigMap at
# /opt/keycloak/themes/synapse (see base/deployment.yaml + kustomization.yaml).
parent=keycloak.v2
import=common/keycloak

# `styles` replaces the parent's list, so re-include the parent stylesheet
# first; css/styles.css resolves up the theme hierarchy to keycloak.v2.
#
# ⚠ The css filename is VERSIONED (synapse.v2.css): Cloudflare caches
# /resources/<ver>/login/synapse/css/* for 30 days and the <ver> prefix does
# not change on redeploys, so a content change must change the FILENAME (bump
# v2 → v3 here, in the file itself, and in base/kustomization.yaml +
# base/deployment.yaml items) or the edge keeps serving the stale sheet.
styles=css/styles.css css/synapse.v2.css
stylesCommon=vendor/patternfly-v5/patternfly.min.css vendor/patternfly-v5/patternfly-addons.css

darkMode=true
