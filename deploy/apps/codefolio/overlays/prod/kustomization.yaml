apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps-prod
resources:
- ../../base
- ingress.yaml
- sealedsecret.yaml
patches:
- patch: "- op: replace\n  path: /spec/replicas\n  value: 2"
  target:
    kind: Deployment
    name: codefolio
- patch: "- op: add\n  path: /spec/template/spec/containers/0/env/-\n  value:\n  \
    \  name: PISTON_URL\n    value: \"http://piston:2000\""
  target:
    kind: Deployment
    name: codefolio
images:
- name: ghcr.io/ani2fun/codefolio
  newName: ghcr.io/ani2fun/codefolio
  newTag: bdc87ab557cdda145d81375396b7d619f01548fd
