apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  # Owned by codefolio, targets piston pods. NetworkPolicies are additive
  # within a namespace, so this stacks with `piston-allow-ingress-from-traefik`
  # without contention.
  name: piston-allow-ingress-from-codefolio
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: piston
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: codefolio
              app.kubernetes.io/component: app
      ports:
        - protocol: TCP
          port: 2000
