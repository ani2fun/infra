apiVersion: apps/v1
kind: Deployment
metadata:
  name: codefolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: codefolio
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codefolio
        app.kubernetes.io/component: app
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: codefolio
          image: ghcr.io/ani2fun/codefolio:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          # Static portfolio — no databases, no auth, no code-runner. Just the listen port; the server
          # serves the Vite bundle from /app/static and a trivial /api/health for the probes below.
          env:
            - name: PORT
              value: "8080"
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
