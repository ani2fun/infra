apiVersion: apps/v1
kind: Deployment
metadata:
  name: codefolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: codefolio
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codefolio
        app.kubernetes.io/component: app
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: codefolio
          image: ghcr.io/ani2fun/codefolio:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DB_URL
              value: jdbc:postgresql://postgresql.databases-prod.svc.cluster.local:5432/codefolio
            - name: DB_USER
              value: codefolio
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: codefolio-db
                  key: postgres-password
            - name: REDIS_URL
              value: redis://codefolio-redis:6379
            - name: MONGO_URI
              value: mongodb://codefolio-mongo:27017
            - name: MONGO_DB
              value: codefolio
            - name: CORTEX_AUTO_RELOAD
              value: "false"
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
