apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apps-prod

resources:
  - ../../base
  - ingress.yaml

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: notebook-app

images:
  - name: ani2fun/note-book
    newName: ani2fun/note-book
    newTag: 5f7face64c914bb16a1f334708833336413debd6