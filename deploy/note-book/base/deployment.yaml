apiVersion: apps/v1
kind: Deployment
metadata:
  name: notebook-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notebook-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notebook-app
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: notebook-app
          image: ani2fun/note-book:fb6d7997036be0c601c582e353e435f498f266cc
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000

          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6

          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault