apiVersion: apps/v1
kind: Deployment
metadata:
  name: piston
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: piston
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: piston
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: piston
          image: ghcr.io/engineer-man/piston:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - >-
              CGROUP_FS=/sys/fs/cgroup &&
              [ -e "$CGROUP_FS" ] &&
              [ ! -e "$CGROUP_FS/unified" ] &&
              [ -e "$CGROUP_FS/cgroup.subtree_control" ] &&
              cd "$CGROUP_FS" &&
              mkdir -p isolate &&
              { echo 1 > isolate/cgroup.procs || true; } &&
              { echo '+cpuset +cpu +io +memory +pids' > cgroup.subtree_control || true; } &&
              cd isolate &&
              mkdir -p init &&
              { echo 1 > init/cgroup.procs || true; } &&
              { echo '+cpuset +memory' > cgroup.subtree_control || true; } &&
              echo "Initialized cgroup" &&
              chown -R piston:piston /piston &&
              exec su -- piston -c 'ulimit -n 65536 && node /piston_api/src'
          ports:
            - name: http
              containerPort: 2000
          env:
            # Allow browser requests from any origin (static mdBook site)
            - name: PISTON_CORS_ORIGIN
              value: "*"
          volumeMounts:
            - name: packages
              mountPath: /piston/packages
          readinessProbe:
            httpGet:
              path: /api/v2/runtimes
              port: 2000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /api/v2/runtimes
              port: 2000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          # Piston uses `unshare` to sandbox code execution — requires privileged mode
          securityContext:
            privileged: true
      volumes:
        - name: packages
          persistentVolumeClaim:
            claimName: piston-packages
