apiVersion: apps/v1
kind: Deployment
metadata:
  name: piston
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: piston
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: piston
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: piston
          image: ghcr.io/engineer-man/piston:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - >-
              CGROUP_FS=/sys/fs/cgroup &&
              [ -e "$CGROUP_FS" ] &&
              [ ! -e "$CGROUP_FS/unified" ] &&
              [ -e "$CGROUP_FS/cgroup.subtree_control" ] &&
              cd "$CGROUP_FS" &&
              mkdir -p isolate &&
              { echo 1 > isolate/cgroup.procs || true; } &&
              { echo '+cpuset +cpu +io +memory +pids' > cgroup.subtree_control || true; } &&
              cd isolate &&
              mkdir -p init &&
              { echo 1 > init/cgroup.procs || true; } &&
              { echo '+cpuset +memory' > cgroup.subtree_control || true; } &&
              echo "Initialized cgroup" &&
              chown -R piston:piston /piston &&
              su -- piston -c 'ulimit -n 65536 && node /piston_api/src' &
              api_pid=$! &&
              node -e "
              const http = require('http');
              const request = (method, path, body) => new Promise((resolve, reject) => {
                const req = http.request(
                  {
                    hostname: '127.0.0.1',
                    port: 2000,
                    path,
                    method,
                    headers: body ? { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) } : {}
                  },
                  (res) => {
                    let data = '';
                    res.on('data', (chunk) => data += chunk);
                    res.on('end', () => resolve({ status: res.statusCode, data }));
                  }
                );
                req.on('error', reject);
                if (body) req.write(body);
                req.end();
              });
              (async () => {
                for (let i = 0; i < 60; i += 1) {
                  try {
                    const packages = await request('GET', '/api/v2/packages');
                    if (packages.status === 200) {
                      const list = JSON.parse(packages.data);
                      const rustInstalled = list.some((pkg) => pkg.language === 'rust' && pkg.installed);
                      if (!rustInstalled) {
                        const install = await request('POST', '/api/v2/packages', JSON.stringify({ language: 'rust', version: '*' }));
                        if (install.status < 200 || install.status >= 300) {
                          throw new Error('Rust install failed: ' + install.status + ' ' + install.data);
                        }
                      }
                      return;
                    }
                  } catch (_) {}
                  await new Promise((resolve) => setTimeout(resolve, 1000));
                }
                throw new Error('Timed out waiting for the Piston API to become ready');
              })().catch((error) => {
                console.error(error.message || error);
                process.exit(1);
              });
              " &&
              wait "$api_pid"
          ports:
            - name: http
              containerPort: 2000
          env:
            - name: PISTON_CORS_ORIGIN
              value: "https://notebook.kakde.eu"
            - name: PISTON_DISABLE_NETWORKING
              value: "true"
            - name: PISTON_MAX_CONCURRENT_JOBS
              value: "4"
            - name: PISTON_COMPILE_TIMEOUT
              value: "10000"
            - name: PISTON_RUN_TIMEOUT
              value: "3000"
            - name: PISTON_COMPILE_MEMORY_LIMIT
              value: "536870912"
            - name: PISTON_RUN_MEMORY_LIMIT
              value: "268435456"
            - name: PISTON_OUTPUT_MAX_SIZE
              value: "16384"
            - name: PISTON_MAX_FILE_SIZE
              value: "1048576"
            - name: PISTON_MAX_PROCESS_COUNT
              value: "64"
            - name: PISTON_MAX_OPEN_FILES
              value: "64"
          volumeMounts:
            - name: packages
              mountPath: /piston/packages
          readinessProbe:
            httpGet:
              path: /api/v2/runtimes
              port: 2000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /api/v2/runtimes
              port: 2000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          # Piston uses `unshare` to sandbox code execution — requires privileged mode
          securityContext:
            privileged: true
      volumes:
        - name: packages
          persistentVolumeClaim:
            claimName: piston-packages
