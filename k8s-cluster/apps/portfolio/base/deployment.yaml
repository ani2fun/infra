apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portfolio-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portfolio-app
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: portfolio-app
          image: ani2fun/portfolio-app:960c42375c734445d0cc07a39a471901eca81a15
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault