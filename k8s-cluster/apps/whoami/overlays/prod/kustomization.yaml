apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps
resources:
  - ../../base
  - ingress-whoami.yaml
  # When ready to deploy whoami-auth (OAuth2-protected variant):
  # 1. Uncomment the oauth2-proxy-* lines in base/kustomization.yaml.
  # 2. Run scripts/secrets/seal-whoami-oauth2-proxy.sh to produce
  #    sealedsecret-oauth2-proxy.yaml (next to this file).
  # 3. Uncomment the two lines below.
  # - sealedsecret-oauth2-proxy.yaml
  # - ingress-whoami-auth.yaml
