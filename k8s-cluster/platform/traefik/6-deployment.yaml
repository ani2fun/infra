apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kakde.eu/edge: "true"
      tolerations:
        - key: kakde.eu/edge
          operator: Equal
          value: "true"
          effect: NoSchedule
      initContainers:
        - name: init-acme
          image: busybox:1.36
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /data
              touch /data/acme-staging.json /data/acme-prod.json
              chmod 600 /data/acme-staging.json /data/acme-prod.json
              chown -R 65532:65532 /data
          volumeMounts:
            - name: traefik-data
              mountPath: /data
      containers:
        - name: traefik
          image: traefik:v2.11
          args:
            - --providers.kubernetesingress=true
            - --providers.kubernetesingress.ingressclass=traefik
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            - --accesslog=true
            - --log.level=INFO
            - --entrypoints.web.http.redirections.entrypoint.to=websecure
            - --entrypoints.web.http.redirections.entrypoint.scheme=https
            - --api=true
            - --api.dashboard=true
            - --api.insecure=true
            - --providers.kubernetesingress.ingressendpoint.ip=84.247.143.66
          ports:
            - name: web
              containerPort: 80
            - name: websecure
              containerPort: 443
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: traefik-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: traefik-data
          hostPath:
            path: /var/lib/traefik
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
