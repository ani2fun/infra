workloads:
  - name: notebook-app
    namespace: apps-prod
    kind: Deployment
    managed_by: argocd
    image: ani2fun/note-book:da2df55f9d144a6e6801adedb0377ad7dd81bec9
    replicas: 2
    service:
      name: notebook-app
      port: 80
      target_port: 3000
    ingress:
      host: notebook.kakde.eu
      tls_secret: notebook-kakde-eu-tls
      cluster_issuer: letsencrypt-prod-dns01

  - name: notebook-app-dev
    namespace: apps-dev
    kind: Deployment
    managed_by: kustomize
    image_source: overlay-resolved
    service:
      name: notebook-app
      port: 80
      target_port: 3000
    ingress:
      host: dev.notebook.kakde.eu
      tls_secret: dev-notebook-kakde-eu-tls
      cluster_issuer: letsencrypt-staging-dns01

  - name: portfolio-app
    namespace: apps-prod
    kind: Deployment
    managed_by: argocd
    image: ani2fun/portfolio-app:960c42375c734445d0cc07a39a471901eca81a15
    replicas: 2
    service:
      name: portfolio-app
      port: 80
      target_port: 3000
    ingress:
      host: kakde.eu
      tls_secret: kakde-eu-tls
      cluster_issuer: letsencrypt-prod-dns01

  - name: portfolio-app-dev
    namespace: apps-dev
    kind: Deployment
    managed_by: kustomize
    image_source: overlay-resolved
    service:
      name: portfolio-app
      port: 80
      target_port: 3000
    ingress:
      host: dev.kakde.eu
      tls_secret: dev-kakde-eu-tls
      cluster_issuer: letsencrypt-staging-dns01

  - name: kroki
    namespace: apps-prod
    kind: Deployment
    managed_by: argocd
    image: yuzutech/kroki:0.30.0
    replicas: 1
    service:
      name: kroki
      port: 8000
      target_port: 8000
    dependencies:
      - kroki-excalidraw.apps-prod.svc.cluster.local:8004

  - name: kroki-excalidraw
    namespace: apps-prod
    kind: Deployment
    managed_by: argocd
    image: yuzutech/kroki-excalidraw:0.30.0
    replicas: 1
    service:
      name: kroki-excalidraw
      port: 8004
      target_port: 8004

  - name: postgresql
    namespace: databases-prod
    kind: StatefulSet
    managed_by: kubectl-manifests
    image: postgres:17.9
    replicas: 1
    pvc:
      storage_class: local-path
      size: 80Gi
    access:
      service: postgresql.databases-prod.svc.cluster.local:5432
      namespace_access_label: kakde.eu/postgresql-access=true

  - name: keycloak
    namespace: identity
    kind: Deployment
    managed_by: kubectl-manifests
    image: quay.io/keycloak/keycloak:26.5.5
    replicas: 1
    service:
      name: keycloak
      port: 80
      target_port: 8080
    ingress:
      host: keycloak.kakde.eu
      tls_secret: keycloak-tls
      cluster_issuer: letsencrypt-prod-dns01
    secrets:
      - keycloak-admin-secret
      - keycloak-db-secret
    database:
      type: postgres
      host: postgresql.databases-prod.svc.cluster.local
      port: 5432
      name: keycloak

  - name: whoami
    namespace: apps-prod
    kind: Deployment
    managed_by: kubectl-manifests
    image: traefik/whoami
    replicas: 1
    service:
      name: whoami
      port: 80
      target_port: 80
    ingress:
      host: whoami.kakde.eu

  - name: whoami-oauth2-proxy
    namespace: apps-prod
    kind: Deployment
    managed_by: kubectl-manifests
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.14.3
    replicas: 1
    service:
      name: whoami-oauth2-proxy
      port: 4180
      target_port: 4180
    ingress:
      host: whoami-auth.kakde.eu
    secrets:
      - whoami-oauth2-proxy
    oidc:
      provider: keycloak-oidc
      issuer_url: https://keycloak.kakde.eu/realms/kakde
      redirect_url: https://whoami-auth.kakde.eu/oauth2/callback

  - name: argocd
    namespace: argocd
    kind: platform
    managed_by: kubectl + manual patches
    host: argocd.kakde.eu
    pinned_node_label:
      workload: argocd
    internal_tls_disabled: true
